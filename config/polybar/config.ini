; ============================================================================
;  Polybar Configuration - Minimal & Clean
;  LMDE 7 on MacBook Pro 2015
; ============================================================================

[colors]
background     = #1a1b26
background-alt = #292e42
foreground     = #c0caf5
foreground-alt = #a9b1d6
primary        = #7aa2f7
secondary      = #9ece6a
alert          = #f7768e
disabled       = #565f89
red            = #f7768e
green          = #9ece6a
yellow         = #e0af68
blue           = #7aa2f7
magenta        = #bb9af7
cyan           = #7dcfff
white          = #a9b1d6

; ── Main Bar ───────────────────────────────────────────────────────────────

[bar/main]
width = 100%
height = 32pt
radius = 0

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2pt

border-bottom-size = 0pt
border-bottom-color = ${colors.background-alt}

padding-left = 1
padding-right = 2

module-margin-left = 1
module-margin-right = 1

separator =
separator-foreground = ${colors.disabled}

; Fonts
font-0 = "JetBrains Mono:size=10;3"
font-1 = "Font Awesome 6 Free Solid:size=10;3"
font-2 = "Font Awesome 6 Free Regular:size=10;3"
font-3 = "Font Awesome 6 Brands Regular:size=10;3"
font-4 = "JetBrains Mono:size=10:weight=bold;3"

; Module layout
modules-left = bspwm
modules-center = xwindow
modules-right = pulseaudio wlan cpu memory battery date

; Tray
tray-position = right
tray-padding = 4
tray-background = ${colors.background}

; bspwm integration
wm-restack = bspwm
override-redirect = false

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; ── Modules ────────────────────────────────────────────────────────────────

[module/bspwm]
type = internal/bspwm

; Focused workspace
label-focused = %name%
label-focused-background = ${colors.background-alt}
label-focused-foreground = ${colors.primary}
label-focused-underline = ${colors.primary}
label-focused-padding = 2

; Occupied workspace
label-occupied = %name%
label-occupied-foreground = ${colors.foreground-alt}
label-occupied-padding = 2

; Empty workspace
label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 2

; Urgent workspace
label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-foreground = ${colors.background}
label-urgent-padding = 2

; Separator between workspaces
label-separator = " "

[module/xwindow]
type = internal/xwindow
label = %title:0:48:...%
label-foreground = ${colors.foreground-alt}
label-empty =
label-empty-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = " "
format-volume-prefix-foreground = ${colors.blue}
format-volume = <label-volume>
label-volume = %percentage%%
label-volume-foreground = ${colors.foreground}

format-muted-prefix = " "
format-muted-prefix-foreground = ${colors.disabled}
label-muted = muted
label-muted-foreground = ${colors.disabled}

click-right = pavucontrol

[module/wlan]
type = internal/network
interface-type = wireless
interval = 5

format-connected = <label-connected>
format-connected-prefix = " "
format-connected-prefix-foreground = ${colors.green}
label-connected = %essid%
label-connected-foreground = ${colors.foreground}

format-disconnected = <label-disconnected>
format-disconnected-prefix = " "
format-disconnected-prefix-foreground = ${colors.disabled}
label-disconnected = offline
label-disconnected-foreground = ${colors.disabled}

[module/cpu]
type = internal/cpu
interval = 3

format-prefix = " "
format-prefix-foreground = ${colors.cyan}
label = %percentage%%
label-foreground = ${colors.foreground}

warn-percentage = 80
format-warn-prefix = " "
format-warn-prefix-foreground = ${colors.alert}
label-warn = %percentage%%
label-warn-foreground = ${colors.alert}

[module/memory]
type = internal/memory
interval = 5

format-prefix = " "
format-prefix-foreground = ${colors.magenta}
label = %percentage_used%%
label-foreground = ${colors.foreground}

warn-percentage = 90
format-warn-prefix = " "
format-warn-prefix-foreground = ${colors.alert}
label-warn = %percentage_used%%
label-warn-foreground = ${colors.alert}

[module/battery]
type = internal/battery
battery = BAT0
adapter = ADP1
full-at = 98
low-at = 15
poll-interval = 30

format-charging = <label-charging>
format-charging-prefix = " "
format-charging-prefix-foreground = ${colors.green}
label-charging = %percentage%%
label-charging-foreground = ${colors.foreground}

format-discharging = <label-discharging>
format-discharging-prefix = " "
format-discharging-prefix-foreground = ${colors.yellow}
label-discharging = %percentage%%
label-discharging-foreground = ${colors.foreground}

format-full = <label-full>
format-full-prefix = " "
format-full-prefix-foreground = ${colors.green}
label-full = full
label-full-foreground = ${colors.foreground}

format-low = <label-low>
format-low-prefix = " "
format-low-prefix-foreground = ${colors.alert}
label-low = %percentage%%
label-low-foreground = ${colors.alert}

[module/date]
type = internal/date
interval = 30

date = %a %b %d
time = %H:%M

format-prefix = " "
format-prefix-foreground = ${colors.blue}
label = %date%  %time%
label-foreground = ${colors.foreground}

; ── Global Settings ────────────────────────────────────────────────────────

[settings]
screenchange-reload = true
pseudo-transparency = false

[global/wm]
margin-top = 0
margin-bottom = 0
